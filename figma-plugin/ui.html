<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background: #0d0d0d; color: #f9f9f9;
      padding: 20px; font-size: 12px;
    }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .logo { font-size: 14px; font-weight: 600; }
    .badge {
      font-size: 9px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; padding: 2px 8px;
      border-radius: 99px; background: #1a1a1a; color: #5c5c5c;
      border: 1px solid #242424;
    }
    .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #3d3d3d; flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.connected  { background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.5); }
    .dot.connecting { background: #fbbf24; animation: pulse 1s infinite; }
    .dot.error      { background: #f87171; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-text { color: #a0a0a0; font-size: 11px; }
    .log {
      background: #080808; border: 1px solid #1a1a1a;
      border-radius: 6px; padding: 10px; height: 110px;
      overflow-y: auto; font-family: "JetBrains Mono", monospace;
      font-size: 10px; color: #5c5c5c; line-height: 1.6;
    }
    .log .ok   { color: #4ade80; }
    .log .err  { color: #f87171; }
    .log .info { color: #60a5fa; }
    .hint { margin-top: 12px; font-size: 10px; color: #3d3d3d; line-height: 1.5; }
    .hint code { color: #5c5c5c; background: #111; padding: 1px 4px; border-radius: 3px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">Claude MCP Bridge</div>
    <div class="badge">Figma Plugin</div>
  </div>

  <div class="status-row">
    <div class="dot connecting" id="dot"></div>
    <div class="status-text" id="status">Connecting to Claude Code...</div>
  </div>

  <div class="log" id="log"></div>

  <div class="hint">
    Keep this plugin open while Claude Code runs.<br/>
    Port: <code>3845</code> · Commands execute via Figma Plugin API
  </div>

  <script>
    const PORT = 3845;
    let ws = null;
    let msgId = 0;
    let pending = {};

    const dot = document.getElementById('dot');
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');

    function log(text, type = '') {
      const line = document.createElement('div');
      if (type) line.className = type;
      line.textContent = text;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(state, text) {
      dot.className = 'dot ' + state;
      statusEl.textContent = text;
    }

    // ── WebSocket to figma-developer-mcp local server ──
    function connect() {
      setStatus('connecting', 'Connecting to Claude Code...');
      try {
        ws = new WebSocket(`ws://localhost:${PORT}`);
      } catch (e) {
        retry();
        return;
      }

      ws.onopen = () => {
        setStatus('connected', 'Connected — ready for commands');
        log('✓ MCP bridge active on port ' + PORT, 'ok');
        ws.send(JSON.stringify({ type: 'plugin_ready', source: 'figma-plugin' }));
      };

      ws.onmessage = (event) => {
        let msg;
        try { msg = JSON.parse(event.data); }
        catch { return; }

        log('← ' + (msg.command || msg.type || 'message'), 'info');

        // Forward command to plugin sandbox (code.js)
        window.parent.postMessage({
          pluginMessage: {
            id: msg.id || (++msgId),
            command: msg.command,
            params: msg.params || msg.data || {}
          }
        }, '*');
      };

      ws.onclose = () => {
        setStatus('error', 'Disconnected — retrying in 2s...');
        log('✗ Connection lost', 'err');
        retry();
      };

      ws.onerror = () => {
        setStatus('error', 'Cannot reach Claude Code (port ' + PORT + ')');
        log('Make sure figma-developer-mcp is running', 'err');
      };
    }

    function retry() {
      setTimeout(connect, 2000);
    }

    // ── Results from code.js → forward back to MCP server ──
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      log('→ result:' + (msg.success ? 'ok' : 'err'), msg.success ? 'ok' : 'err');
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          id: msg.id,
          success: msg.success,
          result: msg.result,
          error: msg.error
        }));
      }
    };

    connect();
  </script>
</body>
</html>
